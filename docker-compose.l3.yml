services:
  main-db:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: tinystore
      POSTGRES_USER: tinystore
      POSTGRES_PASSWORD: tinystore
    volumes:
      - main-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tinystore']
      interval: 5s
      timeout: 3s
      retries: 5

  orders-db:
    image: postgres:16-alpine
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: orders
      POSTGRES_USER: orders
      POSTGRES_PASSWORD: orders
    volumes:
      - orders-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U orders']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper

  temporal:
    image: temporalio/auto-setup:1.24.2
    ports:
      - '7233:7233'
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: tinystore
      POSTGRES_PWD: tinystore
      POSTGRES_SEEDS: main-db
    depends_on:
      main-db:
        condition: service_healthy

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - '16686:16686'
      - '4318:4318'
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - '9090:9090'
    volumes:
      - ./infra/prometheus:/etc/prometheus

  grafana:
    image: grafana/grafana:10.4.1
    ports:
      - '3001:3000'
    volumes:
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
      - ./infra/grafana/provisioning:/etc/grafana/provisioning

  monolith:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '3000:3000'
    environment:
      EXTRACTED_MODULES: orders
      DB_HOST: main-db
      DB_PORT: '5432'
      DB_USER: tinystore
      DB_PASSWORD: tinystore
      DB_NAME: tinystore
      REDIS_URL: redis://redis:6379
      KAFKA_BROKER: kafka:9092
      TEMPORAL_ADDRESS: temporal:7233
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    depends_on:
      main-db:
        condition: service_healthy
      redis:
        condition: service_healthy

  orders-service:
    build:
      context: .
      dockerfile: apps/orders-service/Dockerfile
    ports:
      - '3001:3001'
    environment:
      PORT: '3001'
      DB_HOST: orders-db
      DB_PORT: '5432'
      DB_USER: orders
      DB_PASSWORD: orders
      DB_NAME: orders
      REDIS_URL: redis://redis:6379
      KAFKA_BROKER: kafka:9092
      TEMPORAL_ADDRESS: temporal:7233
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    depends_on:
      orders-db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  main-db-data:
  orders-db-data:
