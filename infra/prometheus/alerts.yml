groups:
  - name: tiny-store-module-slo
    interval: 30s
    rules:
      - alert: ModuleHighErrorRate
        expr: |
          (
            sum by (module) (rate({__name__=~".+\\.errors"}[5m]))
            /
            sum by (module) (rate({__name__=~".+\\.requests"}[5m]))
          ) > 0.05
        for: 10m
        labels:
          severity: page
        annotations:
          summary: "Module {{ $labels.module }} error rate above 5%"
          description: "5xx/error rate has exceeded the 5% SLO budget for module {{ $labels.module }} over the last 10 minutes."

      - alert: ModuleHighLatencyP95
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, module) (rate({__name__=~".+\\.latency_bucket"}[5m]))
          ) > 0.5
        for: 10m
        labels:
          severity: page
        annotations:
          summary: "Module {{ $labels.module }} p95 latency above 500ms"
          description: "p95 request latency for module {{ $labels.module }} has exceeded 500ms for 10 minutes."

      - alert: ModuleNoTraffic
        expr: |
          sum by (module) (rate({__name__=~".+\\.requests"}[5m])) == 0
        for: 15m
        labels:
          severity: warn
        annotations:
          summary: "Module {{ $labels.module }} receiving no traffic"
          description: "No requests recorded against module {{ $labels.module }} for 15 minutes."
